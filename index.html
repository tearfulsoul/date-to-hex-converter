<!DOCTYPE html>
<html>
<head>
  <title>Date Hex Tool</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f12;
      color: #fff;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #1a1b1f;
      padding: 20px;
      box-sizing: border-box;
    }

    .sidebar h2 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .channel {
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      color: #ccc;
    }

    .channel:hover {
      background: #2b2d31;
      color: white;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 30px;
      background: #111214;
    }

    .card {
      background: #1e1f24;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: #2b2d31;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #5865f2;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4752c4;
    }

    .output {
      margin-top: 20px;
      background: #2b2d31;
      padding: 15px;
      border-radius: 6px;
      white-space: pre-wrap;
    }

    .copy {
      margin-top: 10px;
      background: #3a3d45;
    }

  </style>
</head>

<body>

  <div class="sidebar">
    <h2>TOOLS</h2>
    <div class="channel"># date-converter</div>
    <div class="channel"># hex-tools</div>
    <div class="channel"># system</div>
  </div>

  <div class="main">
    <div class="card">
      <h2>Date → Hex Converter</h2>

      <input type="date" id="date">

      <button onclick="convert()">Convert</button>

      <div class="output" id="out">Result will appear here...</div>

      <button class="copy" onclick="copyText()">Copy Result</button>
    </div>
  </div>

<script>
let lastOutput = "";

function toUnixHex(date){
    const unix = Math.floor(date.getTime() / 1000);
    return "0x" + unix.toString(16).toUpperCase();
}

function toFileTimeHex(date){
    const filetime = (date.getTime() + 11644473600000) * 10000;
    return "0x" + BigInt(filetime).toString(16).toUpperCase();
}

function convert(){
    const input = document.getElementById("date").value;
    const date = new Date(input);

    if (isNaN(date)) {
        lastOutput = "Invalid date.";
        document.getElementById("out").innerText = lastOutput;
        return;
    }

    lastOutput =
`InstallDate (Unix hex):
${toUnixHex(date)}

InstallTime (FILETIME hex):
${toFileTimeHex(date)}`;

    document.getElementById("out").innerText = lastOutput;
}

function copyText(){
    navigator.clipboard.writeText(lastOutput);
}
</script>

</body>
</html>
