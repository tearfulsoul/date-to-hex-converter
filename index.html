<!DOCTYPE html>
<html>
<head>
  <title>Date Hex Converter</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0c10;
      font-family: system-ui, Arial, sans-serif;
      color: #e6e6e6;
    }

    .panel {
      width: 420px;
      padding: 24px;
      border-radius: 12px;
      background: #14161b;
      border: 1px solid #2a2d36;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      font-weight: 600;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2d36;
      background: #0f1116;
      color: #e6e6e6;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3a6ff7;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      background: #2f5fe0;
    }

    .output {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #0f1116;
      border: 1px solid #2a2d36;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      white-space: pre;
      line-height: 1.6;
    }

    .subtle {
      margin-top: 10px;
      font-size: 12px;
      color: #8a8f98;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="panel">
  <h1>Date → Hex Converter</h1>

  <div class="row">
    <input type="date" id="date">
  </div>

  <button onclick="convert()">Convert</button>

  <div class="output" id="out">Select a date to begin</div>

  <div class="subtle">Unix timestamp + FILETIME conversion</div>
</div>

<script>
function toUnixHex(date){
    const unix = Math.floor(date.getTime() / 1000);
    return "0x" + unix.toString(16).toUpperCase();
}

function toFileTimeHex(date){
    const filetime = (date.getTime() + 11644473600000) * 10000;
    return "0x" + BigInt(filetime).toString(16).toUpperCase();
}

function convert(){
    const input = document.getElementById("date").value;
    const date = new Date(input);

    if (isNaN(date)){
        document.getElementById("out").innerText = "Invalid date selected.";
        return;
    }

    document.getElementById("out").innerText =
`InstallDate      : ${toUnixHex(date)}
InstallTime      : ${toFileTimeHex(date)}`;
}
</script>

</body>
</html>
